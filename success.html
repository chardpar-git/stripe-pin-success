<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AST Networks - PIN Delivery</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at top left,
      rgba(255,255,255,.12),
      transparent 40%),
    linear-gradient(135deg,#0033a0,#0d47ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  background:#fff;
  width:100%;
  max-width:650px;
  border-radius:30px;
  padding:50px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo img{
  width:130px;
  margin-bottom:20px;
}

.logo h2{
  margin:0;
  color:#13274f;
  font-size:48px;
  letter-spacing:2px;
}

.check-icon{
  width:80px;
  height:80px;
  border:3px solid #4CAF50;
  border-radius:50%;
  margin:30px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#4CAF50;
  font-size:42px;
}

h1{
  color:#0ca63b;
  margin-bottom:15px;
  font-size:48px;
}

.subtitle{
  color:#5f6c7b;
  font-size:28px;
  line-height:1.5;
}

.pin-title{
  margin-top:50px;
  color:#13274f;
  font-size:38px;
  font-weight:bold;
}

.pin-box{
  margin-top:20px;
  background:#f5f7fb;
  border:3px dashed #b8c4d6;
  border-radius:20px;
  padding:30px;
  font-size:80px;
  font-weight:bold;
  color:#0046d5;
  letter-spacing:18px;
}

.buttons{
  margin-top:35px;
}

button{
  border:none;
  border-radius:12px;
  padding:18px 30px;
  font-size:24px;
  color:#fff;
  cursor:pointer;
  margin:10px;
  min-width:220px;
}

.copy-btn{
  background:#0052ff;
}

.print-btn{
  background:#0ca63b;
}

button:hover{
  opacity:.9;
}

.copy-message{
  display:none;
  margin-top:30px;
  background:#edf8ef;
  border:1px solid #b8e1c0;
  color:#0ca63b;
  padding:18px;
  border-radius:12px;
  font-size:22px;
  font-weight:bold;
}

.notice{
  margin-top:40px;
  color:#5f6c7b;
  font-size:22px;
  line-height:1.5;
}

.footer{
  margin-top:50px;
  padding-top:30px;
  border-top:1px solid #e5e7eb;
  color:#777;
  font-size:22px;
}

.spinner{
  width:55px;
  height:55px;
  border:6px solid #f3f3f3;
  border-top:6px solid #0052ff;
  border-radius:50%;
  margin:30px auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

@media(max-width:700px){

  .card{
    padding:35px 20px;
  }

  .logo h2{
    font-size:32px;
  }

  h1{
    font-size:34px;
  }

  .subtitle{
    font-size:20px;
  }

  .pin-title{
    font-size:28px;
  }

  .pin-box{
    font-size:50px;
    letter-spacing:8px;
    padding:25px;
  }

  button{
    width:100%;
    font-size:18px;
    min-width:auto;
  }

  .footer,
  .notice{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="ast-logo.png" alt="AST Networks Logo">
    <h2>AST NETWORKS</h2>
  </div>

  <div id="content">
    <div class="check-icon">✓</div>

    <h1>Payment Successful!</h1>

    <div class="subtitle">
      Thank you for your purchase.<br>
      Your PIN is being retrieved.
    </div>

    <div class="spinner"></div>
  </div>

  <div class="footer">
    🔒 Secure • Fast • Reliable
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const sessionId = params.get("session_id");

const endpoint =
"https://mtchkmgfwnhbsasaoslo.supabase.co/functions/v1/get-pin";

let tries = 0;
const maxTries = 15;

const content = document.getElementById("content");

async function loadPin(){

  try{

    const res = await fetch(
      `${endpoint}?session_id=${encodeURIComponent(sessionId)}`
    );

    const data = await res.json();

    if(data.pin){

      content.innerHTML = `
        <div class="check-icon">✓</div>

        <h1>Payment Successful!</h1>

        <div class="subtitle">
          Thank you for your purchase.<br>
          Your PIN is ready below.
        </div>

        <div class="pin-title">
          Your PIN is:
        </div>

        <div class="pin-box">
          ${data.pin}
        </div>

        <div class="buttons">
          <button class="copy-btn" id="copyBtn">
            📋 Copy PIN
          </button>

          <button class="print-btn"
            onclick="window.print()">
            🖨 Print
          </button>
        </div>

        <div class="copy-message" id="copyMessage">
          ✅ PIN copied to clipboard!
        </div>

        <div class="notice">
          🛡️ Please save this PIN for your records.<br>
          You will need it for activation.
        </div>
      `;

      document
        .getElementById("copyBtn")
        .addEventListener("click", async () => {

          try{
            await navigator.clipboard.writeText(data.pin);

            document.getElementById(
              "copyMessage"
            ).style.display = "block";

          }catch(e){
            alert(
              "Unable to copy PIN. Please copy it manually."
            );
          }
      });

      return;
    }

    if(data.status === "pending" &&
      tries < maxTries){

      tries++;

      setTimeout(loadPin,1500);
      return;
    }

    content.innerHTML = `
      <h1>PIN Not Ready</h1>

      <div class="subtitle">
        Payment completed successfully.<br>
        Please refresh this page in a few moments.
      </div>
    `;

  }catch(err){

    console.error(err);

    content.innerHTML = `
      <h1>Error</h1>

      <div class="subtitle">
        Unable to retrieve your PIN.
      </div>

      <br>

      <button class="copy-btn"
        onclick="location.reload()">
        Refresh Page
      </button>
    `;
  }
}

if(!sessionId){

  content.innerHTML = `
    <h1>Missing Session ID</h1>

    <div class="subtitle">
      No session information was found.
    </div>
  `;
}
else{
  loadPin();
}
</script>

</body>
</html>
